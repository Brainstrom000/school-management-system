providers = ["php", "node"]

[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
  "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan config:cache && php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT"